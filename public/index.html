<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ回答</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #f0f8ff;
            padding: 20px;
            margin: 0;
        }

        select, input, button {
            width: 100%;
            font-size: 1.2em;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .btn-submit {
            background: #0055ff;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

            .btn-submit:active {
                background: #0033aa;
            }

        .hidden {
            display: none !important;
        }

        /* 4択ボタンの白背景＆色付き枠線デザイン */
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .btn-choice {
            font-size: 2.2em;
            padding: 35px 10px;
            border-radius: 10px;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
            border-style: solid;
            border-width: 4px;
        }

            .btn-choice:active {
                background: #f0f0f0;
            }

        .btn-a {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn-b {
            border-color: #3498db;
            color: #3498db;
        }

        .btn-c {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .btn-d {
            border-color: #f1c40f;
            color: #e6b800;
        }
        /* 黄色は視認性のため少し濃いめ */
    </style>
</head>
<body>
    <h2>クイズ回答</h2>

    <select id="team">
        <option value="">あなたのチームを選択</option>
    </select>

    <div id="form-area">
        <!-- フリーテキスト用 (18文字制限) -->
        <div id="text-area">
            <input type="text" id="answer" placeholder="回答を入力 (18文字以内)" maxlength="18">
            <button class="btn-submit" onclick="submitTextAnswer()">送信する</button>
        </div>

        <!-- 4択用 -->
        <div id="choice-area" class="hidden">
            <p style="font-weight: bold; color: #333; margin-bottom: 5px;">選択肢をタップして回答</p>
            <div class="choice-grid">
                <button class="btn-choice btn-a" onclick="submitChoiceAnswer('A')">A</button>
                <button class="btn-choice btn-b" onclick="submitChoiceAnswer('B')">B</button>
                <button class="btn-choice btn-c" onclick="submitChoiceAnswer('C')">C</button>
                <button class="btn-choice btn-d" onclick="submitChoiceAnswer('D')">D</button>
            </div>
        </div>
    </div>

    <div id="wait-area" class="hidden">
        <h3 style="color: #0055ff;">送信完了！</h3>
        <p>スクリーンに注目してください。<br>（修正したい場合は、次の問題が始まるまでお待ちください）</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();

        socket.on('update_status', (data) => {
            updateTeamSelect(data.teamCount);
            setFormat(data.currentFormat);
        });

        socket.on('reset_screen', (data) => {
            document.getElementById('answer').value = '';
            document.getElementById('form-area').classList.remove('hidden');
            document.getElementById('wait-area').classList.add('hidden');

            updateTeamSelect(data.teamCount);
            setFormat(data.format);
        });

        function updateTeamSelect(count) {
            const teamSelect = document.getElementById('team');
            const currentSelected = teamSelect.value;
            teamSelect.innerHTML = '<option value="">あなたのチームを選択</option>';
            for (let i = 1; i <= count; i++) {
                const selected = (currentSelected == i) ? 'selected' : '';
                teamSelect.innerHTML += `<option value="${i}" ${selected}>チーム ${i}</option>`;
            }
        }

        function setFormat(format) {
            if (format === 'choice') {
                document.getElementById('text-area').classList.add('hidden');
                document.getElementById('choice-area').classList.remove('hidden');
            } else {
                document.getElementById('text-area').classList.remove('hidden');
                document.getElementById('choice-area').classList.add('hidden');
            }
        }

        function submitTextAnswer() {
            const answer = document.getElementById('answer').value;
            sendAnswer(answer);
        }

        function submitChoiceAnswer(choice) {
            if (confirm(`「${choice}」で送信しますか？`)) {
                sendAnswer(choice);
            }
        }

        function sendAnswer(answerStr) {
            const team = document.getElementById('team').value;
            if (!team || !answerStr) {
                alert("チームを選択し、回答を入力（選択）してください！");
                return;
            }

            socket.emit('submit_answer', { team: parseInt(team), answer: answerStr });

            document.getElementById('form-area').classList.add('hidden');
            document.getElementById('wait-area').classList.remove('hidden');
        }</script>
</body>
</html>
