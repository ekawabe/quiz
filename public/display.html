<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クイズメイン画面</title>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }

        .btn-open {
            background: #0055ff;
            color: white;
        }

        .btn-reset {
            background: #ffaa00;
            color: black;
        }

        /* 20枠を 5列 × 4行 で配置 */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 95vw;
            height: 75vh;
            margin: 0 auto;
        }

        .cell {
            background: #444; /* 初期（待機中） */
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            border: 3px solid #222;
        }

        .team-name {
            font-size: 0.6em;
            color: #ccc;
            margin-bottom: 10px;
        }

        /* 状態による色の変化 */
        .cell.answered {
            background: #555;
            border-color: #00ff00;
        }
            /* 回答済（まだ見えない） */
            .cell.answered .answer-text {
                display: none;
            }

            .cell.answered .status-text:after {
                content: "回答完了！";
                color: #00ff00;
            }

        .cell.open {
            background: #0055ff;
            border-color: #0055ff;
        }
            /* オープン（青） */
            .cell.open .answer-text {
                display: block;
                color: white;
                font-size: 1.2em;
            }

            .cell.open .status-text {
                display: none;
            }

        .cell.correct {
            background: #ff0000;
            border-color: #ff0000;
            transform: scale(1.05);
        }
        /* 正解（赤） */
    </style>
</head>
<body>
    <div class="controls">
        <button class="btn-open" onclick="openAnswers()">全員の回答をオープン</button>
        <button class="btn-reset" onclick="resetAnswers()">次の問題へリセット</button>
    </div>

    <div id="grid"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();
        const grid = document.getElementById('grid');

        // 20マスを生成
        for (let i = 1; i <= 20; i++) {
            const cell = document.createElement('div');
            cell.id = `cell-${i}`;
            cell.className = 'cell';
            cell.onclick = () => toggleCorrect(i); // クリックで正誤判定
            cell.innerHTML = `
                    <div class="team-name">チーム ${i}</div>
                    <div class="status-text">待機中...</div>
                    <div class="answer-text"></div>
                `;
            grid.appendChild(cell);
        }

        // サーバーから状態を受信して画面を更新
        socket.on('update_status', (answers) => {
            for (let i = 1; i <= 20; i++) {
                const data = answers[i];
                const cell = document.getElementById(`cell-${i}`);
                const answerText = cell.querySelector('.answer-text');
                const statusText = cell.querySelector('.status-text');

                // クラスを一旦リセット
                cell.className = 'cell';
                answerText.innerText = data.answer || '';
                statusText.innerText = data.answer ? '' : '待機中...';

                if (data.answer) cell.classList.add('answered');
                if (data.isOpen) cell.classList.add('open');
                if (data.isCorrect) cell.classList.add('correct');
            }
        });

        function openAnswers() { socket.emit('open_answers'); }
        function toggleCorrect(teamId) { socket.emit('toggle_correct', teamId); }
        function resetAnswers() {
            if (confirm("次の問題へリセットしますか？")) socket.emit('reset');
        }</script>
</body>
</html>
