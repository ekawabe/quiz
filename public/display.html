<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クイズ管理者兼メイン画面</title>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            font-size: 1.1em;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }

        .btn-open {
            background: #0055ff;
            color: white;
        }

        .btn-reset-text {
            background: #ffaa00;
            color: black;
        }

        .btn-reset-choice {
            background: #ff8800;
            color: black;
        }

        .btn-setting {
            background: #333;
            color: #888;
            padding: 10px;
        }

        #choice-controls {
            display: none;
            background: #333;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 0 10px;
            align-items: center;
        }

        .btn-choice-judge {
            padding: 8px 15px;
            margin: 0 5px;
            font-size: 1.1em;
            border-radius: 5px;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
            border-style: solid;
            border-width: 3px;
        }

            .btn-choice-judge:active {
                background: #f0f0f0;
            }

        .btn-a {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn-b {
            border-color: #3498db;
            color: #3498db;
        }

        .btn-c {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .btn-d {
            border-color: #f1c40f;
            color: #e6b800;
        }

        #settings-area {
            display: none;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #444;
            margin: 0 auto 15px auto;
            width: fit-content;
        }

        #grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
        }

        .cell {
            background: #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            border: 3px solid #222;
            width: 180px;
            height: 140px;
            box-sizing: border-box;
            padding: 5px;
        }

        .team-name {
            font-size: 0.8em;
            color: #ccc;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .status-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .answer-text {
            display: none;
            color: white;
            font-weight: bold;
            font-size: 24px;
            line-height: 1.2;
            width: 100%;
            word-break: break-all;
            overflow-wrap: anywhere;
        }

        .cell.answered {
            background: #555;
            border-color: #00ff00;
        }

            .cell.answered .status-text:after {
                content: "回答完了";
                color: #00ff00;
            }

        .cell.open {
            background: #0055ff;
            border-color: #0055ff;
        }

            .cell.open .answer-text {
                display: block;
            }

            .cell.open .status-text {
                display: none;
            }

        .cell.correct {
            background: #ff0000;
            border-color: #ff0000;
            transform: scale(1.05);
        }

        /* ランキングエリアのデザイン */
        #ranking-area {
            background: #222;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #444;
            margin: 20px auto;
            width: 90%;
            max-width: 900px;
            text-align: left;
            font-size: 1.3em;
        }

        .rank-line {
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
        }

        .rank-teams {
            color: white;
            margin-left: 10px;
            font-weight: normal;
            line-height: 1.4;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button class="btn-open" onclick="openAnswers()">全員の回答オープン</button>

        <div id="choice-controls">
            正解:
            <button class="btn-choice-judge btn-a" onclick="judgeAll('A')">A</button>
            <button class="btn-choice-judge btn-b" onclick="judgeAll('B')">B</button>
            <button class="btn-choice-judge btn-c" onclick="judgeAll('C')">C</button>
            <button class="btn-choice-judge btn-d" onclick="judgeAll('D')">D</button>
        </div>

        <button class="btn-reset-text" onclick="resetAnswers('text')">次の問題へ (テキスト)</button>
        <button class="btn-reset-choice" onclick="resetAnswers('choice')">次の問題へ (4択)</button>

        <button class="btn-setting" onclick="toggleSettings()">⚙️</button>
    </div>

    <!-- 設定エリア -->
    <div id="settings-area">
        チーム数変更: <input type="number" id="teamCountInput" value="20" min="1" max="100" style="width: 60px; font-size: 1.1em; padding: 5px;">
        <button onclick="changeTeamCount()" style="background:#555; color:white; margin-right: 20px;">変更＆リセット</button>

        <button onclick="resetScores()" style="background:#cc0000; color:white;">ランキング(点数)のみ0にリセット</button>
    </div>

    <div id="grid"></div>

    <!-- ランキングエリア（3位まで表示） -->
    <div id="ranking-area"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();
        const grid = document.getElementById('grid');
        const rankingArea = document.getElementById('ranking-area');

        let currentAnswers = {};
        let currentTeamCount = 20;

        socket.on('update_status', (data) => {
            currentAnswers = data.answers;
            currentTeamCount = data.teamCount;
            document.getElementById('teamCountInput').value = currentTeamCount;

            document.getElementById('choice-controls').style.display = (data.currentFormat === 'choice') ? 'flex' : 'none';

            renderGrid();
            renderRanking();
        });

        function renderGrid() {
            grid.innerHTML = '';
            for (let i = 1; i <= currentTeamCount; i++) {
                const data = currentAnswers[i];
                if (!data) continue;

                const cell = document.createElement('div');
                cell.className = 'cell';
                if (data.answer) cell.classList.add('answered');
                if (data.isOpen) cell.classList.add('open');
                if (data.isCorrect) cell.classList.add('correct');

                cell.onclick = () => toggleCorrect(i);

                // チーム名の横に、リアルタイムの得点を表示
                const currentScore = data.score + (data.isCorrect ? 1 : 0);
                cell.innerHTML = `
                        <div class="team-name">チーム ${i} <span style="color:#ffd700; margin-left:5px;">★${currentScore}</span></div>
                        <div class="status-text">${data.answer ? '' : '待機中...'}</div>
                        <div class="answer-text">${data.answer || ''}</div>
                    `;
                grid.appendChild(cell);
            }
        }

        // ランキングの生成と描画
        function renderRanking() {
            const teamScores = [];
            for (let i = 1; i <= currentTeamCount; i++) {
                const data = currentAnswers[i];
                if (!data) continue;
                // 今の問題で正解状態（赤）になっていれば、スコアを先取り加算してランキングに反映
                const totalScore = data.score + (data.isCorrect ? 1 : 0);
                teamScores.push({ team: i, score: totalScore });
            }

            // スコアごとにチームをまとめる
            const scoreMap = {};
            teamScores.forEach(ts => {
                if (!scoreMap[ts.score]) { scoreMap[ts.score] = []; }
                scoreMap[ts.score].push(ts.team);
            });

            // 点数が高い順に並び替え（0点のチームは大量に並ぶと見栄えが悪いので除外）
            const sortedScores = Object.keys(scoreMap)
                .map(Number)
                .filter(s => s > 0)
                .sort((a, b) => b - a);

            rankingArea.innerHTML = '';

            if (sortedScores.length === 0) {
                rankingArea.innerHTML = '<div style="text-align:center; color:#888;">(正解ランキング待機中...)</div>';
                return;
            }

            // 上位3位まで表示
            for (let i = 0; i < Math.min(3, sortedScores.length); i++) {
                const score = sortedScores[i];
                const teams = scoreMap[score];
                // 「チーム1、2、3」のように文字列をつくる
                const teamStrs = teams.map(t => `${t}`).join('、');

                const rankDiv = document.createElement('div');
                rankDiv.className = 'rank-line';
                rankDiv.innerHTML = `${i + 1}位 (${score}点): <span class="rank-teams">チーム ${teamStrs}</span>`;
                rankingAre
