<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クイズ管理者兼メイン画面</title>
    <style>
        body {
            font-family: sans-serif;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            font-size: 1.1em;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }

        .btn-open {
            background: #0055ff;
            color: white;
        }

        .btn-reset-text {
            background: #ffaa00;
            color: black;
        }

        .btn-reset-choice {
            background: #ff8800;
            color: black;
        }

        .btn-setting {
            background: #333;
            color: #888;
            padding: 10px;
        }

        #choice-controls {
            display: none;
            background: #333;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 0 10px;
            align-items: center;
        }

        .btn-choice-judge {
            padding: 8px 15px;
            margin: 0 5px;
            font-size: 1.1em;
            border-radius: 5px;
            background: #ffffff;
            cursor: pointer;
            font-weight: bold;
            border-style: solid;
            border-width: 3px;
        }

            .btn-choice-judge:active {
                background: #f0f0f0;
            }

        .btn-a {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn-b {
            border-color: #3498db;
            color: #3498db;
        }

        .btn-c {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .btn-d {
            border-color: #f1c40f;
            color: #e6b800;
        }

        #settings-area {
            display: none;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #444;
            margin: 0 auto 15px auto;
            width: fit-content;
        }

        #grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
        }

        .cell {
            background: #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            border: 3px solid #222;
            width: 180px;
            height: 140px;
            box-sizing: border-box;
            padding: 5px;
        }

        .team-name {
            font-size: 0.8em;
            color: #ccc;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .status-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .answer-text {
            display: none;
            color: white;
            font-weight: bold;
            font-size: 24px;
            line-height: 1.2;
            width: 100%;
            word-break: break-all;
            overflow-wrap: anywhere;
        }

        .cell.answered {
            background: #555;
            border-color: #00ff00;
        }

            .cell.answered .status-text:after {
                content: "回答完了";
                color: #00ff00;
            }

        .cell.open {
            background: #0055ff;
            border-color: #0055ff;
        }

            .cell.open .answer-text {
                display: block;
            }

            .cell.open .status-text {
                display: none;
            }

        .cell.correct {
            background: #ff0000;
            border-color: #ff0000;
            transform: scale(1.05);
        }

        /* ランキング表示エリアのデザイン */
        #ranking-area {
            margin: 20px auto;
            padding: 15px;
            background: #222;
            border: 2px solid #555;
            border-radius: 10px;
            width: 90%;
            max-width: 900px;
            text-align: left;
            font-size: 1.2em;
            line-height: 1.6;
        }

        .rank-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            margin-top: 0;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .rank-line {
            font-weight: bold;
        }

        .rank-1 {
            color: #ffd700;
            font-size: 1.3em;
        }
        /* 1位は金 */
        .rank-2 {
            color: #c0c0c0;
            font-size: 1.2em;
        }
        /* 2位は銀 */
        .rank-3 {
            color: #cd7f32;
            font-size: 1.1em;
        }
        /* 3位は銅 */
    </style>
</head>
<body>
    <div class="controls">
        <button class="btn-open" onclick="openAnswers()">全員の回答オープン</button>

        <div id="choice-controls">
            正解:
            <button class="btn-choice-judge btn-a" onclick="judgeAll('A')">A</button>
            <button class="btn-choice-judge btn-b" onclick="judgeAll('B')">B</button>
            <button class="btn-choice-judge btn-c" onclick="judgeAll('C')">C</button>
            <button class="btn-choice-judge btn-d" onclick="judgeAll('D')">D</button>
        </div>

        <button class="btn-reset-text" onclick="resetAnswers('text')">次の問題へ (テキスト)</button>
        <button class="btn-reset-choice" onclick="resetAnswers('choice')">次の問題へ (4択)</button>

        <button class="btn-setting" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-area">
        チーム数変更: <input type="number" id="teamCountInput" value="20" min="1" max="100" style="width: 60px; font-size: 1.1em; padding: 5px;">
        <button onclick="changeTeamCount()" style="background:#555; color:white;">変更してリセット</button>
    </div>

    <!-- 回答グリッド -->
    <div id="grid"></div>

    <!-- ランキングエリア -->
    <div id="ranking-area">
        <div class="rank-title">🏆 現在のランキング (TOP 3)</div>
        <div id="ranking-content">待機中...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();
        const grid = document.getElementById('grid');
        let currentAnswers = {};
        let currentScores = {};
        let currentTeamCount = 20;

        socket.on('update_status', (data) => {
            currentAnswers = data.answers;
            currentScores = data.scores;
            currentTeamCount = data.teamCount;
            document.getElementById('teamCountInput').value = currentTeamCount;

            document.getElementById('choice-controls').style.display = (data.currentFormat === 'choice') ? 'flex' : 'none';

            renderGrid();
            renderRanking(); // ランキングを更新
        });

        function renderGrid() {
            grid.innerHTML = '';
            for (let i = 1; i <= currentTeamCount; i++) {
                const data = currentAnswers[i];
                if (!data) continue;

                const cell = document.createElement('div');
                cell.className = 'cell';
                if (data.answer) cell.classList.add('answered');
                if (data.isOpen) cell.classList.add('open');
                if (data.isCorrect) cell.classList.add('correct');

                cell.onclick = () => toggleCorrect(i);

                cell.innerHTML = `
                        <div class="team-name">チーム ${i}</div>
                        <div class="status-text">${data.answer ? '' : '待機中...'}</div>
                        <div class="answer-text">${data.answer || ''}</div>
                    `;
                grid.appendChild(cell);
            }
        }

        // ランキングの計算と描画
        function renderRanking() {
            const content = document.getElementById('ranking-content');

            // 1. 各チームの現在のスコアを計算（確定スコア ＋ 今の問題で正解しているか）
            const teamCurrentScores = {};
            for (let i = 1; i <= currentTeamCount; i++) {
                let score = currentScores[i] || 0;
                // もし今赤く光っていれば、リアルタイムで+1として計算
                if (currentAnswers[i] && currentAnswers[i].isCorrect) {
                    score += 1;
                }
                teamCurrentScores[i] = score;
            }

            // 2. スコアの重複をなくして降順（大きい順）に並べ替え
            // 例: [3, 1, 1, 0] -> [3, 1, 0]
            const allScores = Object.values(teamCurrentScores);
            const uniqueScores = [...new Set(allScores)].sort((a, b) => b - a);

            // 3. 1点以上のスコアだけを抽出し、上位3つ（3位）までを取得
            const topScores = uniqueScores.filter(s => s > 0).slice(0, 3);

            if (topScores.length === 0) {
                content.innerHTML = '<span style="color:#aaa;">まだ正解したチームはありません</span>';
                return;
            }

            // 4. 取得したスコアごとに、該当するチームをまとめてHTMLを生成
            let html = '';
            topScores.forEach((score, index) => {
                const rank = index + 1; // 1位, 2位, 3位
                const teams = [];
                for (let i = 1; i <= currentTeamCount; i++) {
                    if (teamCurrentScores[i] === score) {
                        teams.push(i);
                    }
                }

                // チーム名が多くなりすぎないよう「チーム1, 2, 3」という表記にする
                const teamList = `チーム ${teams.join(', ')}`;

                html += `<div class="rank-line rank-${rank}">${rank}位 (${score}問正解)： ${teamList}</div>`;
            });

            content.innerHTML = html;
        }

        function toggleSettings() {
            const el = document.getElementById('settings-area');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function changeTeamCount() {
            const count = document.getElementById('teamCountInput').value;
            if (confirm(`チーム数を ${count} に変更して、ランキングや回答を全てリセットしますか？`)) {
                socket.emit('change_team_count', count);
                document.getElementById('settings-area').style.display = 'none';
            }
        }

        function openAnswers() { socket.emit('open_answers'); }
        function toggleCorrect(teamId) { socket.emit('toggle_correct', teamId); }
        function judgeAll(choice) { socket.emit('judge_all_choice', choice); }

        function resetAnswers(format) {
            const formatName = format === 'text' ? 'テキスト形式' : '4択形式';
            if (confirm(`【${formatName}】で次の問題へ進みますか？（正解したチームの得点が確定します）`)) {
                socket.emit('reset', format);
            }
        }</script>
</body>
</html>
